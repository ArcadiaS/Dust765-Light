name: Deploy

on:
  workflow_dispatch: {}
  workflow_run:
    branches: [main, develop]
    workflows: [Build-Test]
    types:
      - completed

permissions:
  contents: write

env:
  CUO_OUTPUT_PATH: "dist"
  CUO_PROJECT_PATH: "src/ClassicUO.Client/ClassicUO.Client.csproj"
  BOOT_PROJECT_PATH: "src/ClassicUO.Bootstrap/src/ClassicUO.Bootstrap.csproj"
  TARGET_FRAMEWORK: net10.0

  DOTNET_NOLOGO: false
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  NUGET_XMLDOC_MODE: skip

jobs:
  build:
    runs-on: ${{ matrix.os }}

    env:
      BRANCH_NAME: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
      COMMIT_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

    strategy:
      matrix:
        include:
          - os: windows-latest
            target: win-x64
          - os: ubuntu-22.04
            target: linux-x64
          - os: macos-14
            target: osx-x64

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Get submodules
        run: git config --global url."https://".insteadOf git:// && git submodule update --init --recursive

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          include-prerelease: false

      - name: Read Version from csproj
        shell: bash
        run: |
          set -e
          V=$(dotnet msbuild "${{ env.CUO_PROJECT_PATH }}" -getProperty:Version -nologo | tail -n 1 | tr -d '\r' | xargs)
          if [[ -z "$V" ]]; then
            echo "Could not read Version from ${{ env.CUO_PROJECT_PATH }}"
            exit 1
          fi
          echo "CUO_PKG_VERSION=${V}" >> "$GITHUB_ENV"
          echo "CUO_ASSEMBLY_VERSION=${V}.${{ github.run_number }}" >> "$GITHUB_ENV"

      - name: Set release metadata
        shell: bash
        run: |
          if [[ "${BRANCH_NAME}" == "main" ]]; then
            echo "CUO_ZIP_NAME=Dust765-Light-${{ matrix.target }}-release.zip" >> "$GITHUB_ENV"
            echo "RELEASE_TAG=v${CUO_ASSEMBLY_VERSION}" >> "$GITHUB_ENV"
            echo "RELEASE_NAME=Dust765-Light ${CUO_PKG_VERSION} (${{ github.run_number }})" >> "$GITHUB_ENV"
            echo "RELEASE_PRERELEASE=false" >> "$GITHUB_ENV"
            echo "RELEASE_ALLOW_UPDATES=true" >> "$GITHUB_ENV"
            echo "RELEASE_MAKE_LATEST=true" >> "$GITHUB_ENV"
            echo "RELEASE_FORCE_TAG=true" >> "$GITHUB_ENV"
          elif [[ "${BRANCH_NAME}" == "develop" ]]; then
            echo "CUO_ZIP_NAME=Dust765-Light-${{ matrix.target }}-dev.zip" >> "$GITHUB_ENV"
            echo "RELEASE_TAG=v${CUO_PKG_VERSION}-develop" >> "$GITHUB_ENV"
            echo "RELEASE_NAME=Dust765-Light ${CUO_PKG_VERSION} develop" >> "$GITHUB_ENV"
            echo "RELEASE_PRERELEASE=true" >> "$GITHUB_ENV"
            echo "RELEASE_ALLOW_UPDATES=true" >> "$GITHUB_ENV"
            echo "RELEASE_MAKE_LATEST=false" >> "$GITHUB_ENV"
            echo "RELEASE_FORCE_TAG=true" >> "$GITHUB_ENV"
          else
            echo "Unsupported branch for deploy: ${BRANCH_NAME}"
            exit 1
          fi

      - name: Build Bootstrap app
        run: dotnet publish "${{ env.BOOT_PROJECT_PATH }}" -c Release -o "${{ env.CUO_OUTPUT_PATH }}" /p:AssemblyVersion=${{ env.CUO_ASSEMBLY_VERSION }} /p:FileVersion=${{ env.CUO_ASSEMBLY_VERSION }} /p:OutputType=WinExe

      - name: Build ClassicUO
        run: dotnet publish "${{ env.CUO_PROJECT_PATH }}" -c Release -r "${{ matrix.target }}" -o "${{ env.CUO_OUTPUT_PATH }}" /p:IS_DEV_BUILD=true /p:AssemblyVersion=${{ env.CUO_ASSEMBLY_VERSION }} /p:FileVersion=${{ env.CUO_ASSEMBLY_VERSION }} /p:NativeLib=Shared /p:OutputType=Library

      - name: Create manifest
        run: dotnet run --project tools/ManifestCreator/ManifestCreator.csproj "${{ env.CUO_OUTPUT_PATH }}" "release" "${{ env.CUO_ZIP_NAME }}" && mkdir upload && mv manifest.xml upload

      - name: Create package
        uses: thedoctor0/zip-release@master
        with:
          type: "zip"
          directory: ${{ env.CUO_OUTPUT_PATH }}
          filename: ${{ env.CUO_ZIP_NAME }}
          exclusions: "*.zip manifest.xml"

      - name: Move output
        run: mv "${{ env.CUO_OUTPUT_PATH }}/${{ env.CUO_ZIP_NAME }}" upload

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: upload/
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-22.04

    env:
      BRANCH_NAME: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
      COMMIT_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.COMMIT_SHA }}
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          include-prerelease: false

      - name: Read Version from csproj
        shell: bash
        run: |
          set -e
          V=$(dotnet msbuild "${{ env.CUO_PROJECT_PATH }}" -getProperty:Version -nologo | tail -n 1 | tr -d '\r' | xargs)
          echo "CUO_PKG_VERSION=${V}" >> "$GITHUB_ENV"
          echo "CUO_ASSEMBLY_VERSION=${V}.${{ github.run_number }}" >> "$GITHUB_ENV"

      - name: Set release metadata
        shell: bash
        run: |
          if [[ "${BRANCH_NAME}" == "main" ]]; then
            echo "RELEASE_TAG=v${CUO_ASSEMBLY_VERSION}" >> "$GITHUB_ENV"
            echo "RELEASE_NAME=Dust765-Light ${CUO_PKG_VERSION} (${{ github.run_number }})" >> "$GITHUB_ENV"
            echo "RELEASE_PRERELEASE=false" >> "$GITHUB_ENV"
            echo "RELEASE_ALLOW_UPDATES=true" >> "$GITHUB_ENV"
            echo "RELEASE_MAKE_LATEST=true" >> "$GITHUB_ENV"
            echo "RELEASE_FORCE_TAG=true" >> "$GITHUB_ENV"
          elif [[ "${BRANCH_NAME}" == "develop" ]]; then
            echo "RELEASE_TAG=v${CUO_PKG_VERSION}-develop" >> "$GITHUB_ENV"
            echo "RELEASE_NAME=Dust765-Light ${CUO_PKG_VERSION} develop" >> "$GITHUB_ENV"
            echo "RELEASE_PRERELEASE=true" >> "$GITHUB_ENV"
            echo "RELEASE_ALLOW_UPDATES=true" >> "$GITHUB_ENV"
            echo "RELEASE_MAKE_LATEST=false" >> "$GITHUB_ENV"
            echo "RELEASE_FORCE_TAG=true" >> "$GITHUB_ENV"
          else
            echo "Unsupported branch for deploy: ${BRANCH_NAME}"
            exit 1
          fi

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-upload
          pattern: dist-*
          merge-multiple: true

      - name: Move tag to latest commit
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Trigger branch: ${{ env.BRANCH_NAME }}"
          echo "Trigger sha: ${{ env.COMMIT_SHA }}"
          echo "Release tag: ${{ env.RELEASE_TAG }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git"
          git fetch --no-tags --prune --depth=1 origin "${{ env.BRANCH_NAME }}"
          git tag -f "${{ env.RELEASE_TAG }}" "${{ env.COMMIT_SHA }}"
          git push -f origin "${{ env.RELEASE_TAG }}"

      - name: Upload Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "release-upload/*.zip"
          name: "${{ env.RELEASE_NAME }}"
          body: "This build may not be safe: use it at your own risk."
          draft: false
          prerelease: ${{ env.RELEASE_PRERELEASE }}
          makeLatest: ${{ env.RELEASE_MAKE_LATEST }}
          allowUpdates: ${{ env.RELEASE_ALLOW_UPDATES }}
          tag: "${{ env.RELEASE_TAG }}"
          token: ${{ secrets.GITHUB_TOKEN }}
          commit: ${{ env.COMMIT_SHA }}
